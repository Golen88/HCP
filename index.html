<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HCP-kalkulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <span class="wordmark">Handicap<span class="dot">.</span></span>
      <div class="badge" aria-hidden="true">⛳</div>
    </header>

    <section class="result-card">
      <div class="result-label">HCP spilt til</div>
      <div class="result-row">
        <div class="result-value" id="resultatVerdi">–</div>
        <div class="result-meta" id="resultatMeta" hidden>
          <span id="metaBrutto"></span>
          <span id="metaHull"></span>
        </div>
      </div>
    </section>

    <form id="hcp-form" class="fields" novalidate>
      <div class="field-card">
        <label class="field-label" for="kjonn">Kjønn</label>
        <div class="select-wrap">
          <select id="kjonn" required>
            <option value="" disabled selected>Velg kjønn</option>
          </select>
          <span class="chevron" aria-hidden="true">▾</span>
        </div>
      </div>

      <div class="field-card">
        <label class="field-label" for="bane">Bane</label>
        <div class="select-wrap">
          <select id="bane" required disabled>
            <option value="" disabled selected>Velg kjønn først</option>
          </select>
          <span class="chevron" aria-hidden="true">▾</span>
        </div>
      </div>

      <div class="field-card">
        <label class="field-label" for="layout">Utslagssted</label>
        <div class="select-wrap">
          <select id="layout" required disabled>
            <option value="" disabled selected>Velg bane først</option>
          </select>
          <span class="chevron" aria-hidden="true">▾</span>
        </div>
      </div>

      <div class="row-split">
        <div class="field-card hull-card">
          <span class="field-label">Hull</span>
          <div class="toggle" role="group" aria-label="Antall hull spilt">
            <button type="button" class="toggle-btn is-active" data-hull="18">18</button>
            <button type="button" class="toggle-btn" data-hull="9">9</button>
          </div>
          <input type="hidden" id="antallHull" value="18">
        </div>

        <div class="field-card slag-card">
          <label class="field-label" for="slagBrutto">Slag brutto</label>
          <input type="number" id="slagBrutto" inputmode="numeric" min="1" step="1" placeholder="0" required>
        </div>
      </div>

      <button type="submit" class="beregn-btn">Beregn HCP spilt til</button>
    </form>

    <p id="feilmelding" class="feilmelding" hidden></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
