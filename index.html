<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HCP-kalkulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>HCP-kalkulator</h1>
    <p class="subtitle">Beregn HCP spilt til basert på brutto antall slag</p>

    <form id="hcp-form" novalidate>
      <div class="field">
        <label for="kjonn">Kjønn</label>
        <select id="kjonn" required>
          <option value="" disabled selected>Velg kjønn</option>
        </select>
      </div>

      <div class="field">
        <label for="bane">Bane</label>
        <select id="bane" required disabled>
          <option value="" disabled selected>Velg kjønn først</option>
        </select>
      </div>

      <div class="field">
        <label for="layout">Utslagssted</label>
        <select id="layout" required disabled>
          <option value="" disabled selected>Velg bane først</option>
        </select>
      </div>

      <div class="field">
        <label for="antallHull">Antall hull spilt</label>
        <select id="antallHull" required>
          <option value="18" selected>18 hull</option>
          <option value="9">9 hull</option>
        </select>
      </div>

      <div class="field">
        <label for="slagBrutto">Antall slag brutto</label>
        <input type="number" id="slagBrutto" inputmode="numeric" min="1" step="1" placeholder="F.eks. 95" required>
      </div>

      <button type="submit">Beregn HCP spilt til</button>
    </form>

    <section id="resultat" class="resultat" hidden>
      <h2>HCP spilt til: <span id="resultatVerdi"></span></h2>
      <dl class="detaljer">
        <dt>Bane</dt>
        <dd id="detaljBane"></dd>
        <dt>Utslagssted</dt>
        <dd id="detaljLayout"></dd>
        <dt>Course Rating (CR)</dt>
        <dd id="detaljCr"></dd>
        <dt>Slope</dt>
        <dd id="detaljSlope"></dd>
        <dt>Antall hull</dt>
        <dd id="detaljHull"></dd>
      </dl>
    </section>

    <p id="feilmelding" class="feilmelding" hidden></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
